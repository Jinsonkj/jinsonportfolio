<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Arvo">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arvo', serif;
            background: #fff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page_404 {
            padding: 40px 0;
            background: #fff;
            width: 100%;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }

        .four_zero_four_bg {
            background-image: url('https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif');
            height: 400px;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .four_zero_four_bg h1 {
            font-size: 80px;
            margin-top: 0;
            text-align: center;
        }

        .contant_box_404 {
            margin-top: -50px;
        }

        .contant_box_404 h3 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .contant_box_404 p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .link_404 {
            color: #fff !important;
            padding: 12px 28px;
            background: #39ac31;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 14px rgba(57, 172, 49, 0.4);
        }

        .link_404:hover {
            background: #2d8a26;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(57, 172, 49, 0.6);
        }
    </style>
</head>
<body>

<section class="page_404">
    <div class="container">
        <div class="four_zero_four_bg">
            <h1>404</h1>
        </div>
        
        <div class="contant_box_404">
            <h3 class="h2">Looks like you're lost</h3>
            <p>The page you are looking for is not available!</p>
            <a href="/" class="link_404">Go to Home</a>
        </div>
    </div>
</section>

<script>
    // Adjust the home link if the portfolio is hosted in a subdirectory
    document.querySelector('.link_404').href = window.location.origin + '/';
    if (window.location.hostname.includes('github.io')) {
        const pathSegments = window.location.pathname.split('/');
        if (pathSegments.length > 1 && pathSegments[1] !== '') {
            document.querySelector('.link_404').href = window.location.origin + '/' + pathSegments[1] + '/';
        }
    }
</script>

</body>
</html>
